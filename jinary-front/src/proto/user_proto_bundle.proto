syntax = "proto3";

// ──────────────────────────────────────────────
// User 메시지: 한 명의 유저 정보를 담는 단위
// ──────────────────────────────────────────────
// Protobuf에서 각 필드 뒤의 숫자(= 1, = 2 …)는 "필드 번호"입니다.
// 이 번호가 실제로 바이너리에 기록되기 때문에,
// 필드 이름("id", "name" 등)은 바이너리에 포함되지 않아 크기가 작아집니다.
// ──────────────────────────────────────────────
message User {
  string id = 1;
  string name = 2;
  string email = 3;
  int32  age = 4;
}

// ──────────────────────────────────────────────
// UserList 메시지: 여러 유저를 한 번에 담는 컨테이너
// ──────────────────────────────────────────────
// "repeated"는 배열(리스트)을 의미합니다.
// JSON의 [ {}, {}, {} ] 와 같은 역할이지만,
// 바이너리에서는 훨씬 적은 바이트로 표현됩니다.
// ──────────────────────────────────────────────
message UserList {
  repeated User users = 1;
}
